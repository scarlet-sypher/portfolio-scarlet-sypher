<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dummy Timeline Spiral</title>
    <style>
        body {
            margin: 0;
            overflow-x: hidden;
            background-color: #ffffff;
            color: #222;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            height: 100vh;
            width: 100vw;
        }

        /* --- LAYOUT --- */
        #main-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            pointer-events: none;
            z-index: 10;
        }

        /* LEFT: Text Area */
        #text-panel {
            width: 45%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 6vw;
            padding-right: 20px;
            box-sizing: border-box;
        }

        /* RIGHT: Spacer */
        #image-spacer {
            width: 55%;
            height: 100%;
        }

        /* --- TYPOGRAPHY --- */
        #info-content {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s ease, transform 0.5s ease;
            text-shadow: 0 0 20px rgba(255,255,255,1); 
        }
        
        #info-content.visible {
            opacity: 1;
            transform: translateY(0);
        }

        h2 {
            margin: 0 0 20px 0;
            font-size: clamp(2rem, 4vw, 3.5rem);
            color: #111;
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1.1;
        }
        
        .year-label {
            color: #d1495b;
            font-size: 1.2rem;
            margin-bottom: 15px;
            letter-spacing: 1px;
            font-weight: 700;
            display: flex;
            align-items: center;
            font-variant-numeric: tabular-nums;
        }
        
        .year-label::before {
            content: '';
            display: inline-block;
            width: 40px;
            height: 3px;
            background: #d1495b;
            margin-right: 15px;
        }

        p {
            line-height: 1.7;
            color: #444;
            font-size: 1.1rem;
            max-width: 90%;
            font-weight: 400;
        }

        /* Scroll Helper */
        .scroll-proxy {
            height: 1000vh; /* Long scroll for timeline feel */
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 5;
        }

        /* 3D Canvas */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            outline: none;
        }
    </style>
</head>
<body>

    <div class="scroll-proxy"></div>

    <div id="main-container">
        <div id="text-panel">
            <div id="info-content">
                <div class="year-label"><span id="item-year">2000</span></div>
                <h2 id="item-title">Title Here</h2>
                <p id="item-desc">Description text.</p>
            </div>
        </div>
        <div id="image-spacer"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- CONFIGURATION ---
        const CONFIG = {
            cardWidth: 2,
            cardHeight: 2.8, // Approx 5:7 Aspect Ratio
            tubeRadius: 1.5,
            spiralLoops: 4,
            spiralDepth: 60,
            spiralMaxRadius: 7,
            fov: 45
        };

        // --- TIMELINE DATA ---
        // Generating 30 years of "About Me" history
        const START_YEAR = 2001;
        const TIMELINE_DATA = [
            { t: "The Beginning", d: "Born in a small town, marking the start of a journey into the digital age. The world was just beginning to connect." },
            { t: "First Computer", d: "Received my first beige desktop PC. Spent hours in MS Paint and playing Minesweeper, sparking a curiosity for tech." },
            { t: "Primary School", d: "Started formal education. Learned the basics of reading, writing, and that recess was the most important subject." },
            { t: "Summer Travels", d: "First family trip abroad. Discovered that the world was much bigger and louder than my backyard." },
            { t: "Console Era", d: "Got a gaming console. Weekends were consumed by 8-bit adventures and pixelated heroes." },
            { t: "New Passion", d: "Picked up a guitar for the first time. It sounded terrible, but the creative spark was ignited." },
            { t: "High School", d: "Entered high school. A time of awkward phases, new friends, and the discovery of coding classes." },
            { t: "First Code", d: "Wrote my first 'Hello World' program. The realization that I could build things from nothing was intoxicating." },
            { t: "Graduation", d: "Caps thrown in the air. High school ended, leaving behind memories and stepping into the unknown." },
            { t: "University Life", d: "Moved to the city for university. Coffee consumption increased by 400%. Late nights and library books." },
            { t: "First Internship", d: "Landed an internship at a tech startup. Realized that production code is very different from homework." },
            { t: "Solo Trip", d: "Backpacked through Europe solo. Learned independence, navigation, and how to sleep on trains." },
            { t: "Degree Earned", d: "Graduated with honors. The paper proved I knew things, but the experience proved I could learn anything." },
            { t: "First Job", d: "Signed the contract for my first full-time developer role. Setup my first real desk workspace." },
            { t: "Big Move", d: "Relocated to a new city for better opportunities. Packed my life into ten boxes." },
            { t: "Senior Dev", d: "Promoted to Senior Developer. Started mentoring juniors and realizing I actually knew what I was doing." },
            { t: "Creative Break", d: "Took a sabbatical to focus on photography and art. Recharged the creative batteries." },
            { t: "New Ventures", d: "Started a side business. The thrill of entrepreneurship brought new challenges." },
            { t: "Global Remote", d: "Transitioned to remote work. The office became wherever the Wi-Fi was strong." },
            { t: "Design Awards", d: "Won a design award for a web project. Validation that code and art can coexist beautifully." },
            { t: "Tech Lead", d: "Lead a team of ten engineers. Learned that managing people is harder than managing servers." },
            { t: "Conference Speaker", d: "Gave my first talk at a tech conference. Terrifying, but exhilarating." },
            { t: "Building a Home", d: "Bought a house. DIY projects replaced weekend coding sessions for a while." },
            { t: "New Hobby", d: "Started hiking mountains. The perspective from the top changed how I viewed the daily grind." },
            { t: "Mentorship", d: "Launched a free coding bootcamp for local youth. Giving back became a priority." },
            { t: "The Next Step", d: "Founded my own studio. The culmination of years of learning, failing, and building." },
            { t: "Present Day", d: "Still learning, still building. The spiral continues, and the best work is yet to come." }
        ];

        // Fill remaining slots if we configured more images than data
        const TOTAL_IMAGES = 30;
        while(TIMELINE_DATA.length < TOTAL_IMAGES) {
            TIMELINE_DATA.push({ t: "Future Vision", d: "The timeline extends forward. New technologies, new places, and new stories waiting to be written." });
        }

        // --- DOM ---
        const domContent = document.getElementById('info-content');
        const domTitle = document.getElementById('item-title');
        const domDesc = document.getElementById('item-desc');
        const domYear = document.getElementById('item-year');

        // --- SCENE ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0xffffff, 0.04); 

        const camera = new THREE.PerspectiveCamera(CONFIG.fov, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 16); 

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0xffffff);
        document.body.appendChild(renderer.domElement);

        // --- TEXTURE GENERATOR ---
        // Creates a canvas texture that loads a web image asynchronously
        function createCardTexture(index) {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 716; 
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0,0,512,716);
            ctx.strokeStyle = "#e0e0e0";
            ctx.lineWidth = 2;
            ctx.strokeRect(0,0,512,716);
            
            ctx.fillStyle = "#ccc";
            ctx.font = "30px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("Loading Artifact...", 256, 358);

            const texture = new THREE.CanvasTexture(canvas);

            // 2. Load Image from Web
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.src = `https://picsum.photos/id/${index + 50}/512/512`; 

            img.onload = () => {
                // Clear
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(0,0,512,716);

                // Draw Photo (Polaroid Style - Top Square)
                // We leave a 25px border around the image
                ctx.drawImage(img, 25, 25, 462, 462);

                // Draw Border around photo
                ctx.strokeStyle = "#eeeeee";
                ctx.lineWidth = 2;
                ctx.strokeRect(25, 25, 462, 462);

                // Bottom Text Area
                const year = START_YEAR + index;
                
                // Year Number
                ctx.fillStyle = "#d1495b";
                ctx.font = "bold 80px Helvetica, Arial";
                ctx.textAlign = "left";
                ctx.fillText(year, 40, 580);

                // Caption Line
                ctx.fillStyle = "#333";
                ctx.font = "30px Helvetica, Arial";
                ctx.fillText(`Archive No. ${String(index+1).padStart(2,'0')}`, 40, 640);
                
                // Outer Card Border
                ctx.strokeStyle = "#e0e0e0";
                ctx.lineWidth = 4;
                ctx.strokeRect(0, 0, 512, 716);

                // Update Texture
                texture.needsUpdate = true;
            };

            return texture;
        }

        // --- PATH ---
        const points = [];
        const steps = 400;
        for (let i = 0; i <= steps; i++) {
            const t = i / steps;
            const angle = t * Math.PI * 2 * CONFIG.spiralLoops;
            const radius = 0.5 + Math.pow(t, 1.1) * CONFIG.spiralMaxRadius;
            const x = Math.cos(angle) * radius;
            const y = Math.sin(angle) * radius;
            const z = (t * CONFIG.spiralDepth) - CONFIG.spiralDepth; 
            points.push(new THREE.Vector3(x, y, z));
        }
        const curve = new THREE.CatmullRomCurve3(points);

        // --- CARDS ---
        const cards = [];
        const basePlaneGeo = new THREE.PlaneGeometry(CONFIG.cardWidth, CONFIG.cardHeight, 10, 10);
        
        // Store base positions for vertex manipulation
        const basePosAttr = basePlaneGeo.attributes.position;
        const basePositions = [];
        for(let i=0; i<basePosAttr.count; i++){
            basePositions.push(new THREE.Vector3(basePosAttr.getX(i), basePosAttr.getY(i), basePosAttr.getZ(i)));
        }

        for (let i = 0; i < TOTAL_IMAGES; i++) {
            const mat = new THREE.MeshBasicMaterial({ 
                map: createCardTexture(i),
                side: THREE.DoubleSide
            });
            const geo = basePlaneGeo.clone();
            const mesh = new THREE.Mesh(geo, mat);
            scene.add(mesh);

            cards.push({
                mesh: mesh,
                index: i,
                baseOffset: i / TOTAL_IMAGES,
                rotationOffset: (i * 60) * (Math.PI / 180),
                currentBend: 1, 
                t: 0
            });
        }

        // --- MORPH GEOMETRY ---
        function updateCardGeometry(card, bendFactor) {
            const positions = card.mesh.geometry.attributes.position;
            const radius = CONFIG.tubeRadius + 0.1; 

            for(let i=0; i<basePositions.length; i++) {
                const v = basePositions[i];
                const flatX = v.x;
                const flatY = v.y;
                const flatZ = v.z;

                // Curved
                const angle = v.x / radius; 
                const curvedX = radius * Math.sin(angle);
                const curvedY = v.y;
                const curvedZ = radius * (1 - Math.cos(angle)); 

                // Lerp
                const x = flatX + (curvedX - flatX) * bendFactor;
                const y = flatY + (curvedY - flatY) * bendFactor;
                const z = flatZ + (curvedZ - flatZ) * bendFactor;

                positions.setXYZ(i, x, y, z);
            }
            positions.needsUpdate = true;
        }

        // --- ANIMATION STATE ---
        let scrollPos = 0;
        let targetScrollPos = 0;
        let activeIndex = -1;

        window.addEventListener('scroll', () => {
            targetScrollPos = window.scrollY * 0.0002;
        });

        function updateSidebar(index) {
            if(index === activeIndex) return;
            activeIndex = index;
            
            domContent.classList.remove('visible');
            setTimeout(() => {
                if(index === -1) return;
                
                const data = TIMELINE_DATA[index];
                
                domYear.innerText = START_YEAR + index;
                domTitle.innerText = data.t;
                domDesc.innerText = data.d;
                
                domContent.classList.add('visible');
            }, 300);
        }

        const clock = new THREE.Clock();
        const spiralOffset = new THREE.Vector3(-3.5, 2.0, 0);

        function animate() {
            scrollPos += (targetScrollPos - scrollPos) * 0.05;

            // Determine focus
            let candidateIndex = -1;
            let maxT = -1;

            cards.forEach(card => {
                let t = (card.baseOffset + scrollPos) % 1;
                if(t < 0) t += 1;
                card.t = t;
                if (t > 0.85 && t < 0.98) {
                    if (t > maxT) {
                        maxT = t;
                        candidateIndex = card.index;
                    }
                }
            });

            if (candidateIndex !== activeIndex) {
                updateSidebar(candidateIndex);
            }

            // --- RESPONSIVE POS ---
            const targetZ = 10;
            const dist = camera.position.z - targetZ;
            const vFOV = THREE.MathUtils.degToRad(camera.fov);
            const visibleHeight = 2 * Math.tan(vFOV / 2) * dist;
            const visibleWidth = visibleHeight * camera.aspect;

            // Scale
            let displayScale = 1.2;
            const maxCardHeight = visibleHeight - 1.0;
            if (CONFIG.cardHeight * displayScale > maxCardHeight) {
                displayScale = maxCardHeight / CONFIG.cardHeight;
            }

            // Position (Right Side)
            let targetX = visibleWidth * 0.25; 
            const halfCardWidth = (CONFIG.cardWidth * displayScale) / 2;
            const screenRightEdge = visibleWidth / 2;
            const rightPadding = 0.5;

            if (targetX + halfCardWidth > screenRightEdge - rightPadding) {
                targetX = (screenRightEdge - rightPadding) - halfCardWidth;
            }

            // Update Cards
            cards.forEach(card => {
                const isFocused = (card.index === activeIndex);
                
                let targetPos = new THREE.Vector3();
                let targetRot = new THREE.Euler();
                let targetScale = 1;
                let targetBend = 1; 

                if (isFocused) {
                    // FOCUSED
                    targetPos.set(targetX, 0, targetZ);
                    targetRot.set(0, -0.2, 0); // Slight angle
                    targetScale = displayScale; 
                    targetBend = 0; 
                    card.mesh.material.opacity = 1;
                } else {
                    // SPIRAL
                    const t = card.t;
                    const posOnCurve = curve.getPointAt(t);
                    targetPos.copy(posOnCurve);
                    targetPos.add(spiralOffset); // Shift spiral

                    const lookAtT = Math.min(t + 0.01, 1);
                    const lookAtPos = curve.getPointAt(lookAtT);
                    const offsetLookAt = lookAtPos.clone().add(spiralOffset);
                    
                    const dummy = new THREE.Object3D();
                    dummy.position.copy(targetPos);
                    dummy.lookAt(offsetLookAt);
                    
                    const spinAngle = (t * Math.PI * 2 * 2) + card.rotationOffset;
                    
                    dummy.rotateZ(spinAngle);
                    dummy.translateX(CONFIG.tubeRadius + 0.1);
                    dummy.rotateY(Math.PI / 2); 

                    dummy.updateMatrix();
                    targetPos.setFromMatrixPosition(dummy.matrix);
                    targetRot.copy(dummy.rotation);
                    
                    targetScale = 0.2 + (t * t) * 0.8;
                    targetBend = 1;

                    if (t < 0.1) card.mesh.material.opacity = t / 0.1;
                    else if (t > 0.95) card.mesh.material.opacity = (1 - t) / 0.05;
                    else card.mesh.material.opacity = 1;
                }

                // Interpolate
                const lerpSpeed = 0.08;
                card.mesh.position.lerp(targetPos, lerpSpeed);
                
                const targetquat = new THREE.Quaternion().setFromEuler(targetRot);
                card.mesh.quaternion.slerp(targetquat, lerpSpeed);

                const currentScale = card.mesh.scale.x;
                const newScale = currentScale + (targetScale - currentScale) * lerpSpeed;
                card.mesh.scale.setScalar(newScale);

                card.currentBend += (targetBend - card.currentBend) * 0.05;
                updateCardGeometry(card, card.currentBend);

                card.mesh.material.transparent = true;
            });

            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
