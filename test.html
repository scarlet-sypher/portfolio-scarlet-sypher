<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Border Animation</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #333;
    }

    .box {
      position: relative;
      height: 220px;
      width: 200px;
      box-shadow: 5px 5px 15px #0008;
      border-radius: 10px;
      color: #aaa;

      display: flex;
      align-items: center;
      justify-content: center;

      text-transform: uppercase;
      letter-spacing: 4px;
      overflow: hidden;
      z-index: 2;
    }

    .box::before,
    .box::after {
      content: "";
      position: absolute;
      height: 150%;
      width: 150%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    /* rotating gradient border */
    .box::before {
      background: conic-gradient(#44f 20deg, transparent 120deg);
      animation: rotate 4s linear infinite;
      z-index: -1;
    }

    /* inner dark layer */
    .box::after {
      background: #222;
      height: 95%;
      width: 95%;
      box-shadow: 5px 5px 15px #0008 inset;
      border-radius: 10px;
      z-index: -1;
    }

    @keyframes rotate {
      100% {
        transform: translate(-50%, -50%) rotate(-360deg);
      }
    }
  </style>
</head>

<body>
  <div class="box">border</div>
</body>
</html>
